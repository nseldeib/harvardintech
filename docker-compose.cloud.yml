# Template for the per-VM cloud compose file. Rendered by
# scripts/gcp-project-bootstrap.sh into the (gitignored) docker-compose.cloud.yml
# at provision time, substituting codeyam-editor-codeyam-editor-7 (the GCE instance name),
# 4321 (the app dev-server port from editor.json), and
# 12930m (the memory limit computed from the VM's total RAM).
# EDIT THIS TEMPLATE, not
# the rendered docker-compose.cloud.yml — the rendered file is a per-VM runtime
# artifact and is gitignored so its VM-specific identity never churns in git.
#
# Mount the project at /workspace and let the pre-built editor image
# drive the session. The container talks to the local Docker daemon
# only; reach the editor from your laptop via an IAP-tunneled SSH
# port-forward (see docs/cloud-gcp.md).
#
# Volume mounts that aren't the project itself:
# - $HOME/.codeyam-cloud-<agent> → /root/.<agent-config-dir> (build-agent
#   credentials survive `docker compose down && up`, image rebuilds, VM
#   stop/start — anything short of `cloud:destroy`). One mount per agent the
#   system supports, so a `--agent codex` / `--agent gemini` VM persists its
#   auth the same way `--agent claude` always has:
#     claude → /root/.claude   codex → /root/.codex   gemini → /root/.gemini
#   All three are mounted regardless of the selected agent (the template is
#   static — rendered by sed, not per-agent), so switching agents on an
#   existing VM never loses a previously-authenticated agent's credentials.
#   The host dirs are created by scripts/gcp-project-bootstrap.sh; the agent
#   list itself lives in npm/cloud.js's AGENT_ENV_VARS.
# - $HOME/.codeyam-cloud-git-credentials → /run/codeyam/git-credentials:ro
#   (so claude can git pull/push from inside the container; written by
#   `cloud:up` from the laptop's `gh auth token`. Mounted read-only at a
#   STAGING path — the entrypoint seeds git's IN-MEMORY credential `cache`
#   daemon from it on boot (one-year timeout), so reads + write-backs (on
#   `push`, via `git credential approve`) never touch the filesystem. A file
#   `store` helper instead rewrites its backing file (lock + rename) on every
#   approve, so a burst of concurrent commit-queue git processes contends on
#   the lockfile and fails with EBUSY ("Device or resource busy") — the cache
#   removes that contention entirely. The Dockerfile sets
#   credential.helper=cache --timeout=… --socket=/run/codeyam/git-credential-cache.socket
#   and trusts /workspace.)
#
# Fixed compose project name so the container is always
# `codeyam-editor-editor-1` regardless of which client project dir this file
# lives in (`~/projects/<repo>`). Without it the project name defaults to the
# dir basename and a non-self-host project (e.g. ~/projects/margo) yields
# `margo-editor-1`, which every `docker exec` in the fleet tooling (dashboard,
# watchdog) — all of which target `codeyam-editor-editor-1` — would miss.
name: codeyam-editor
services:
  editor:
    image: codeyam-editor:local
    # Set the container hostname to the GCE instance name so anything
    # that reads `hostname` (third-party tools, future code) gets the
    # same answer as $CODEYAM_MACHINE below. The env var is the
    # canonical source; this is belt-and-suspenders for code paths
    # that bypass it.
    hostname: codeyam-editor-codeyam-editor-7
    # Inject tini as PID 1 so reparented zombies get reaped. Without
    # this flag the editor binary runs as PID 1 and any subprocess
    # whose parent exits before it (broker -> claude PTY child,
    # detached hook subshells, dev-server restarts) accumulates as
    # <defunct> in the container's process table. Keep this in lock
    # step with docker-compose.cloud.yml.
    init: true
    # Prevent cloud VMs from silently wedging on memory exhaustion by
    # capping container memory. This forces the memory-hog process inside
    # the container (like cargo, node, or claude) to get OOM-killed inside
    # its cgroup while the host (sshd, dockerd) survives. memswap_limit is
    # set equal to mem_limit to prevent container processes from dodging
    # the cap via host swap if swap is ever added.
    mem_limit: 12930m
    memswap_limit: 12930m
    restart: unless-stopped
    ports:
      # Publish interface, resolved at bootstrap time. Default 127.0.0.1 (the
      # SSH-forward model: reached operator-side via `gcloud ssh -L`). When the
      # VM joins a Google-LB fleet (FLEET_DOMAIN set) it becomes 0.0.0.0 so the
      # LB's GCE_VM_IP_PORT NEG can reach these ports on the VM's INTERNAL IP —
      # the load-bearing difference from loopback-only publishing. Exposure stays
      # scoped to the LB ranges by the fleet-ingress-lb-allow firewall rule,
      # never 0.0.0.0/0. Unset = legacy parity, byte-for-byte unchanged.
      - "0.0.0.0:14199:14199"
      # App dev-server port, resolved from editor.json at bootstrap time
      # (apps[0].port ?? port ?? 5173) so Live Preview reaches whatever this
      # project serves on — not a hardcoded Vite default. Published == internal.
      - "0.0.0.0:4321:4321"
    volumes:
      - .:/workspace
      # Per-agent credential homes — one per supported build agent so the
      # selected agent's auth persists across restarts. See the header comment.
      - $HOME/.codeyam-cloud-claude:/root/.claude
      - $HOME/.codeyam-cloud-codex:/root/.codex
      - $HOME/.codeyam-cloud-gemini:/root/.gemini
      - $HOME/.codeyam-cloud-git-credentials:/run/codeyam/git-credentials:ro
      # Named volume so `rebuild-self --force-in-container` writes that land
      # at /usr/local/cargo/bin/codeyam-editor survive `docker compose down
      # && up -d`. The entrypoint script hydrates this from
      # /opt/cargo-bin-baseline on first start (or after an explicit
      # `docker volume rm`).
      - cargo-bin:/usr/local/cargo/bin
      # Persistent cargo build-target cache. Redirected via CARGO_TARGET_DIR so
      # incremental `rebuild-self --force-in-container` builds are warm on
      # subsequent runs instead of starting cold from an empty target/. Only
      # relevant on self-host VMs that run cargo; guest VMs carry the volume but
      # never write to it. Mounted outside /workspace so it does NOT shadow any
      # project file named `target/`.
      - cargo-target:/codeyam-build-target
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CODEYAM_BIND_HOST=0.0.0.0
      # Unique per-VM machine identity for branch-queue meta.machine,
      # plan-claim host_machine, audit attribution, and session logs.
      # Consumed by codeyam_types::machine::current_machine().
      - CODEYAM_MACHINE=codeyam-editor-codeyam-editor-7
      # Git author identity for the in-container build agent. The entrypoint
      # runs `git config --global user.{name,email}` from these; without them
      # plan_claim_refs::create_claim's `git commit-tree` exits with "Author
      # identity unknown" and the claim is silently never written.
      # gcp-project-bootstrap.sh sed-substitutes these at provision time from
      # the operator's laptop git config (forwarded by cloud:up); the rendered
      # compose file is gitignored, so the identity stays per-VM and never
      # churns in tracked state.
      - CY_GIT_USER_NAME=Jared Cosulich
      - CY_GIT_USER_EMAIL=jared.cosulich@gmail.com
      # Redirect cargo's build-artifact cache to the persistent named volume
      # so incremental builds are warm across container restarts. Does not
      # affect the image's own /editor/target (set at Dockerfile build time,
      # not at runtime). Non-Rust projects ignore this env.
      - CARGO_TARGET_DIR=/codeyam-build-target

volumes:
  cargo-bin:
  cargo-target:
