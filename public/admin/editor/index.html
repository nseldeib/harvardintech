<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- The admin app must never be indexed; it is an editing surface, not content. -->
    <meta name="robots" content="noindex" />
    <title>Content Manager</title>
  </head>
  <body>
    <!--
      Sveltia CMS — a modern, Decap-compatible, git-based content editor.

      It auto-loads ./config.yml (served from this same public/admin/editor/
      folder) and commits markdown straight into the site's content collections.
      There is no build step and no server you run: Astro copies everything under
      public/ verbatim, so this file lands at /admin/editor/ on the live site and
      at /admin/editor/ on the local dev server unchanged. The /admin route
      itself is the CRM dashboard (src/pages/admin/index.astro), which links here.

      The script auto-initialises on load — the same convention Decap uses — so
      no inline init code is needed here. The auth backend (token sign-in — paste
      a fine-grained GitHub PAT — or local-repository mode) is selected entirely
      in config.yml; see CMS_SETUP.md for the two paths.

      Pinned to the v0 major from the CDN for reproducible scaffolds.
    -->
    <script src="https://unpkg.com/@sveltia/cms@0/dist/sveltia-cms.js"></script>
    <!--
      Deploy-status banner. Loads after the Sveltia bundle (same auto-init,
      no-inline convention) and shows the editor a "Deploying… → 🎉 live" toast
      after each save by polling the build marker (/deploy-status.json). Pure,
      tested spec lives in src/lib/deployStatus.ts; this is a minimal mirror
      because public/ is served verbatim and cannot import the bundle.
    -->
    <script type="module" src="./deploy-status.js"></script>
  </body>
</html>
