# Sveltia CMS configuration (Decap-compatible).
#
# CONTRACT: every field `name` under a collection below must also exist in the
# matching Astro content-collection schema in `src/content/config.ts`. If they
# drift, the CMS will write frontmatter the site can't validate at build time.
# codeyam's template test `astro_cms_config_fields_subset_of_content_schema`
# enforces this for the shipped template — keep it true when you add fields.
# The reserved `body` field maps to the markdown body, not frontmatter, so it
# is intentionally absent from the content schema.

# How the CMS authenticates and where it commits. Two paths, no extra service:
#   - Token (hosted): editors click "Sign in with Token" at /admin/editor/ and
#     paste a fine-grained GitHub PAT (Contents: Read & Write on this repo).
#     Sveltia stores it in their browser and commits with it — no relay, no
#     Worker, nothing to deploy. `auth_methods: [token]` below keeps the login
#     screen token-only (no unwired "Sign in with GitHub" OAuth button).
#   - Local: leave `local_backend: true` below and open /admin from a local
#     dev server — no auth, no relay.
# See CMS_SETUP.md for the editor-facing steps (and how to add OAuth later).
backend:
  name: github
  repo: nseldeib/harvardintech
  branch: main
  # Login screen shows only "Sign in with Token" (no unwired OAuth button).
  auth_methods: [token]

# Local-repository editing. When /admin is opened from a local dev server,
# Sveltia offers "Work with Local Repository" and writes straight to disk — no
# auth, no network. This only activates on localhost, so it is safe to ship
# enabled alongside a hosted backend.
local_backend: true

# Uploaded images. `media_folder` is repo-relative; living under public/ means
# Astro serves them verbatim (no asset-pipeline step), so the `public_folder`
# URL resolves on a static build.
#
# `public_folder` stays BASE-LESS (`/uploads`, no `/harvardintech` prefix) on
# purpose. This site applies the GitHub Pages `base` once at render time via
# `withBase()` (src/lib/url.ts), and `base` is env-driven (`/` locally, `/<repo>/`
# on the Pages build) — so baking the base into the stored value here would
# double-prefix it under `withBase` and break local "Work with Local Repository"
# previews. Hosted-CMS previews stay correct regardless of the Pages base because
# uploads live INSIDE `media_folder`: Sveltia resolves them to their repo path and
# loads the blob through the GitHub backend, not via the deployed public URL.
# (Media stored OUTSIDE this folder — e.g. the committed team headshots under
# /images/team — needs a field-level media_folder mapping to get the same
# backend-blob preview; see the team `photo` field below.)
media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  # ── Site-wide singletons ────────────────────────────────────────────────
  # "file" collections edit one fixed file rather than a folder of entries.
  # These back the editable global settings and navigation: every field name
  # below must be a top-level key in the matching `src/data/*.json`, or the
  # site loader (`src/lib/site.ts`) reads data the schema doesn't declare. The
  # template test `astro_cms_config_fields_subset_of_content_schema` enforces
  # both the folder-collection and singleton sides of this contract.
  - name: settings
    label: "Site Settings"
    files:
      - name: general
        label: "General"
        file: "src/data/settings.json"
        fields:
          - { name: siteTitle, label: "Site title", widget: string }
          - { name: description, label: "Description", widget: text }
          - { name: contactEmail, label: "Contact email", widget: string }
          - { name: footerText, label: "Footer text", widget: string }
          - name: socials
            label: "Social links"
            widget: list
            fields:
              - { name: label, label: Label, widget: string }
              - { name: url, label: URL, widget: string }
              - { name: icon, label: Icon, widget: string, required: false }

  - name: nav
    label: "Navigation"
    files:
      - name: menu
        label: "Menu"
        file: "src/data/nav.json"
        fields:
          - name: items
            label: "Menu items"
            widget: list
            fields:
              - { name: label, label: Label, widget: string }
              - { name: url, label: URL, widget: string, required: false }
              - name: children
                label: "Dropdown items"
                widget: list
                required: false
                fields:
                  - { name: label, label: Label, widget: string }
                  - { name: url, label: URL, widget: string }

  # ── Content collections ─────────────────────────────────────────────────
  # Field names mirror the matching schema in src/content/config.ts. Optional
  # schema fields are `required: false` here. `body` is the reserved
  # markdown-body widget (not frontmatter).
  - name: blog
    label: "Blog"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date, widget: datetime }
      - { name: summary, label: Summary, widget: string, required: false }
      - { name: coverImage, label: "Cover image", widget: image, required: false }
      - { name: body, label: Body, widget: markdown, required: false }

  - name: pages
    label: "Pages"
    folder: "src/content/pages"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: description, label: Description, widget: string, required: false }
      - { name: order, label: Order, widget: number, required: false }
      - { name: body, label: Body, widget: markdown, required: false }

  - name: team
    label: "Team"
    folder: "src/content/team"
    create: true
    slug: "{{slug}}"
    summary: "{{name}} — {{role}} · {{active | default(true) | ternary('On Board of Directors','Hidden from board')}}"
    fields:
      - { name: name, label: Name, widget: string }
      - { name: role, label: Role, widget: string }
      # The committed headshots live under public/images/team — OUTSIDE the global
      # media_folder — and are stored base-less (e.g. `/images/team/ben-wei.png`)
      # because the site adds the Pages base at render via withBase(). A field-level
      # media_folder/public_folder maps that existing value back to its repo file so
      # Sveltia previews the thumbnail via the GitHub backend (fixing the blank-box
      # bug in the hosted CMS) without rewriting the stored frontmatter value.
      - name: photo
        label: Photo
        widget: image
        required: false
        media_folder: "/public/images/team"
        public_folder: "/images/team"
      - { name: bio, label: Bio, widget: markdown, required: false }
      - { name: order, label: Order, widget: number, required: false }
      - { name: active, label: "Show on Board of Directors", widget: boolean, default: true, required: false }
      - { name: body, label: Body, widget: markdown, required: false }

  - name: events
    label: "Events"
    folder: "src/content/events"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date, widget: datetime }
      - { name: location, label: Location, widget: string, required: false }
      - { name: description, label: Description, widget: string, required: false }
      - { name: link, label: Link, widget: string, required: false }
      # Slug of the chapter this event belongs to (e.g. `nyc`, `san-francisco`).
      # Surfaces the event in that chapter page's Upcoming Events section; leave
      # blank for a non-chapter event.
      - { name: chapter, label: Chapter, widget: string, required: false }
      - { name: body, label: Body, widget: markdown, required: false }

  - name: chapters
    label: "Chapters"
    # Chapters have no `title` field — the city names the entry in the CMS list.
    identifier_field: city
    folder: "src/content/chapters"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: city, label: City, widget: string }
      - { name: region, label: Region, widget: string, required: false }
      - { name: blurb, label: Blurb, widget: text, required: false }
      # The committed city header photos live under public/images/chapters —
      # OUTSIDE the global media_folder — and are stored base-less (e.g.
      # `/images/chapters/nyc.jpg`) because the site adds the Pages base at
      # render via withBase(). A field-level media_folder/public_folder maps that
      # value back to its repo file so Sveltia previews the image via the GitHub
      # backend (same pattern as the team `photo` field above).
      - name: heroImage
        label: "Hero image"
        widget: image
        required: false
        media_folder: "/public/images/chapters"
        public_folder: "/images/chapters"
      - { name: tagline, label: Tagline, widget: string, required: false }
      - { name: showGallery, label: "Show photo gallery", widget: boolean, default: true, required: false }
      # Per-chapter "Connect With Us" email; leave blank to use the global
      # Site Settings contact email.
      - { name: contactEmail, label: "Contact email", widget: string, required: false }
      - { name: order, label: Order, widget: number, required: false }
      - name: leads
        label: "Leads"
        widget: list
        required: false
        fields:
          - { name: name, label: Name, widget: string }
          - { name: role, label: Role, widget: string, required: false }
      - name: links
        label: "Links"
        widget: list
        required: false
        fields:
          - { name: label, label: Label, widget: string }
          - { name: url, label: URL, widget: string }
      - { name: body, label: Body, widget: markdown, required: false }
