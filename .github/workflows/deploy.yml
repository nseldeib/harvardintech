# Build the Astro static site and publish it to GitHub Pages.
#
# Setup: none in the common case. The build job's "Enable / configure GitHub
# Pages" step (actions/configure-pages with enablement: true) turns Pages on
# automatically — Source: "GitHub Actions" — on the first push to the default
# branch, so there is no manual Settings → Pages toggle. If your org policy
# blocks token-based enablement and the first deploy 404s, run
# `scripts/enable-pages.sh` once (or toggle the UI) and re-run — see
# DEPLOY_SETUP.md.
#
# `base`/`site` come from the env vars below (read by astro.config.mjs), so the
# site publishes under the project subpath jaredcosulich.github.io/harvardintech
# while local dev / the codeyam preview stay at '/'. When a custom domain
# (e.g. harvardintech.com) is configured, drop DEPLOY_BASE_PATH (so base → '/')
# and point PAGES_SITE at the domain.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Enable Pages (build type "workflow") if it isn't already. Idempotent —
      # a no-op once Pages exists — so it's safe on every push. Runs before the
      # build so the Pages site exists by the time the deploy job publishes.
      # We use it only for this enablement side effect; base/site stay driven by
      # the DEPLOY_BASE_PATH/PAGES_SITE env vars below (its outputs are unused).
      - name: Enable / configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          # Pages is already enabled (Settings → Pages → Source: GitHub Actions),
          # so we do NOT ask the action to create/enable it — token-based
          # enablement returns an HTML error on this repo. enablement:false just
          # reads the existing Pages config for the upload/deploy steps.
          enablement: false
      - name: Build Astro site
        uses: withastro/action@v3
        env:
          DEPLOY_BASE_PATH: /harvardintech
          PAGES_SITE: https://nseldeib.github.io
          # Admin dashboard passcode (deterrent only — ends up in the built JS).
          # Set the value as a repo secret: Settings → Secrets and variables →
          # Actions → New repository secret named ADMIN_GATE_PASSCODE. If the
          # secret is unset, AdminGate.astro falls back to its built-in default.
          ADMIN_GATE_PASSCODE: ${{ secrets.ADMIN_GATE_PASSCODE }}
        # with:
        #   path: .            # root of the Astro project (default)
        #   node-version: 20

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
